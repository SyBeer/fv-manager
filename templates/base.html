<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}FV Manager{% endblock %}</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  body { background: #0f172a; color: #e2e8f0; font-family: system-ui, sans-serif; }
  .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 1.5rem; }
  .btn { display: inline-block; padding: .5rem 1.25rem; border-radius: 8px; font-weight: 600; cursor: pointer; transition: opacity .15s; }
  .btn:hover { opacity: .85; }
  .btn-primary { background: #f59e0b; color: #0f172a; }
  .btn-green { background: #22c55e; color: #0f172a; }
  .btn-red { background: #ef4444; color: white; }
  .btn-ghost { background: #334155; color: #e2e8f0; }
  .nav-link { padding: .5rem .75rem; border-radius: 8px; color: #94a3b8; text-decoration: none; font-size: .9rem; }
  .nav-link:hover, .nav-link.active { background: #334155; color: #f1f5f9; }
  input, select, textarea { background: #0f172a; border: 1px solid #475569; border-radius: 8px; padding: .5rem .75rem; color: #e2e8f0; width: 100%; }
  input:focus, select:focus { outline: none; border-color: #f59e0b; }
  .badge-green { background: #166534; color: #86efac; padding: .2rem .6rem; border-radius: 999px; font-size: .75rem; font-weight: 600; }
  .badge-yellow { background: #713f12; color: #fde68a; padding: .2rem .6rem; border-radius: 999px; font-size: .75rem; font-weight: 600; }
  .badge-blue { background: #1e3a5f; color: #93c5fd; padding: .2rem .6rem; border-radius: 999px; font-size: .75rem; font-weight: 600; }
  table { width: 100%; border-collapse: collapse; font-size: .9rem; }
  th { text-align: left; padding: .6rem .75rem; color: #64748b; font-weight: 500; border-bottom: 1px solid #334155; }
  td { padding: .55rem .75rem; border-bottom: 1px solid #1e293b; }
  tr:hover td { background: #1e293b; }
  .stat-value { font-size: 1.8rem; font-weight: 700; }
  .stat-label { font-size: .8rem; color: #64748b; text-transform: uppercase; letter-spacing: .05em; margin-top: .25rem; }
</style>
</head>
<body>
{% set rp = request.scope.get("root_path", "") %}
<div style="display:flex; min-height:100vh;">
  <!-- Sidebar -->
  <nav style="width:220px; background:#1e293b; border-right:1px solid #334155; padding:1.5rem 1rem; flex-shrink:0; display:flex; flex-direction:column; gap:.25rem;">
    <div style="font-size:1.1rem; font-weight:700; color:#f59e0b; margin-bottom:1.25rem; padding-left:.5rem;">
      ☀️ FV Manager
    </div>
    <a href="{{ rp }}/" class="nav-link {% if request.url.path == '/' %}active{% endif %}">📊 Dashboard</a>
    <a href="{{ rp }}/roi" class="nav-link {% if request.url.path == '/roi' %}active{% endif %}">💰 ROI</a>
    <a href="{{ rp }}/odczyty" class="nav-link {% if '/odczyty' in request.url.path %}active{% endif %}">📋 Odczyty</a>
    <a href="{{ rp }}/inwestycje" class="nav-link {% if '/inwestycje' in request.url.path %}active{% endif %}">🏗️ Inwestycje</a>
    <a href="{{ rp }}/ev" class="nav-link {% if request.url.path == '/ev' %}active{% endif %}">🚗 EV</a>
    <a href="{{ rp }}/import" class="nav-link {% if request.url.path == '/import' %}active{% endif %}">📥 Import</a>
  </nav>
  <!-- Content -->
  <main style="flex:1; padding:2rem; overflow:auto;">
    {% block content %}{% endblock %}
  </main>
</div>
</body>
</html>
